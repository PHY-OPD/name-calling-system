<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอแสดงคิว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=RumgqmVn"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; overflow: hidden; }
        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        .bg-medical { background: linear-gradient(135deg, #f0f9ff 0%, #dbeafe 100%); }
        /* เพิ่ม CSS พิเศษป้องกันสระบน/ล่างโดนตัด และจัดบรรทัดให้สวยงาม */
        .name-text { line-height: 1.4 !important; padding-top: 1rem; padding-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-medical text-gray-800 h-screen flex flex-col relative">
    
    <div id="startOverlay" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center">
        <h2 class="text-white text-3xl mb-10 font-bold tracking-wide">ระบบเรียกชื่อผู้รับบริการ</h2>
        <button id="startBtn" class="bg-blue-600 text-white text-4xl px-12 py-6 rounded-2xl shadow-[0_0_30px_rgba(37,99,235,0.5)] hover:bg-blue-500 hover:scale-105 transition">
            ▶ เริ่มระบบประกาศเสียง
        </button>
        <button id="testSoundBtn" class="mt-8 text-slate-400 hover:text-white border-2 border-slate-600 hover:border-slate-400 px-6 py-3 rounded-full text-xl transition flex items-center gap-2">
            🔊 ทดสอบเสียงลำโพง
        </button>
    </div>

    <header class="bg-white shadow-md py-4 px-8 flex justify-between items-center border-b-4 border-blue-600 z-30">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-2 rounded-full text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-blue-900 tracking-wide">แผนกเวชระเบียน โรงพยาบาลพะเยา</h1>
                <p class="text-blue-600 font-semibold">ระบบเรียกชื่อผู้รับบริการ</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div id="networkStatus" class="flex items-center gap-2 text-sm font-bold text-slate-500 bg-slate-100 px-4 py-2 rounded-full border border-slate-200 shadow-sm transition-colors duration-300">
                <span class="w-3 h-3 rounded-full bg-slate-400"></span> กำลังเชื่อมต่อ...
            </div>
            <div class="text-3xl font-bold text-slate-700 bg-slate-100 px-6 py-2 rounded-xl border shadow-inner" id="clock">
                00:00:00
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col justify-center items-center px-4 relative py-4">
        <p class="text-4xl text-slate-500 mb-6 font-bold tracking-widest">ขอเชิญผู้รับบริการ</p>
        
        <div id="mainBox" class="bg-white border-4 border-blue-200 rounded-[3rem] p-12 md:p-16 shadow-2xl w-full max-w-5xl text-center relative transition-colors duration-500">
            
            <div id="recallBadge" class="hidden absolute -top-8 -right-8 bg-orange-500 text-white px-8 py-3 rounded-full text-3xl font-bold shadow-xl animate-bounce border-4 border-white z-10">
                🔄 เรียกซ้ำ
            </div>

            <h1 id="displayName" class="text-6xl md:text-[5.5rem] font-bold text-blue-900 mb-8 break-words whitespace-normal blink name-text transition-colors duration-500">
                -- ว่าง --
            </h1>
            
            <div id="counterBubble" class="inline-block bg-blue-700 px-16 py-6 rounded-full shadow-lg transition-colors duration-500 mt-4">
                <h2 id="displayCounter" class="text-5xl md:text-6xl font-bold text-yellow-300">กรุณารอเรียกชื่อ</h2>
            </div>
        </div>
    </main>

    <footer class="bg-slate-800 text-white p-4 shadow-inner mt-auto flex flex-col justify-center z-30">
        <div class="flex items-center gap-4 max-w-7xl mx-auto w-full mb-2">
            <div class="bg-slate-700 px-4 py-2 rounded-lg font-bold whitespace-nowrap text-lg">📋 เรียกล่าสุด:</div>
            <div id="recentList" class="flex gap-4 overflow-hidden text-xl font-semibold text-slate-300 w-full">
                <span class="text-slate-500 italic">ยังไม่มีการเรียกคิว</span>
            </div>
        </div>
        <div class="text-xs text-slate-400 text-center mt-2 border-t border-slate-700 pt-2 w-full max-w-7xl mx-auto opacity-70">
            © สงวนลิขสิทธิ์ ออกแบบและพัฒนาโดยห้องเวชระเบียนผู้ป่วยนอกโรงพยาบาลพะเยา
        </div>
    </footer>

    <div id="marqueeContainer" class="bg-blue-900 text-yellow-300 w-full overflow-hidden border-t-2 border-blue-700 hidden shadow-md z-40">
        <marquee id="marqueeText" class="py-3 text-2xl font-bold tracking-wider" scrollamount="6"></marquee>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onValue, query, orderByChild, startAt } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAUg9GVdMIYVX4M6w2K4gMVdYy3YlbowxU",
            authDomain: "ne-q-3e0b7.firebaseapp.com",
            databaseURL: "https://ne-q-3e0b7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ne-q-3e0b7",
            storageBucket: "ne-q-3e0b7.firebasestorage.app",
            messagingSenderId: "559471760244",
            appId: "1:559471760244:web:0d1721ae633f26b3a29221"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            const statusDiv = document.getElementById('networkStatus');
            if (snap.val() === true) {
                statusDiv.innerHTML = '<span class="w-3 h-3 rounded-full bg-green-500 animate-[pulse_2s_ease-in-out_infinite]"></span> ออนไลน์ (เชื่อมต่อแล้ว)';
                statusDiv.className = 'flex items-center gap-2 text-sm font-bold text-green-700 bg-green-100 px-4 py-2 rounded-full border border-green-300 shadow-sm transition-colors duration-300';
            } else {
                statusDiv.innerHTML = '<span class="w-3 h-3 rounded-full bg-red-600 animate-[pulse_1s_ease-in-out_infinite]"></span> ออฟไลน์ (เน็ตหลุด)';
                statusDiv.className = 'flex items-center gap-2 text-sm font-bold text-red-700 bg-red-100 px-4 py-2 rounded-full border border-red-400 shadow-md transition-colors duration-300';
            }
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH'); }, 1000);

        onValue(ref(db, 'live/marquee'), (snapshot) => {
            const text = snapshot.val();
            const container = document.getElementById('marqueeContainer');
            const marquee = document.getElementById('marqueeText');
            
            if (text && text.trim() !== "") {
                marquee.innerText = text;
                container.classList.remove('hidden');
                if (typeof marquee.start === 'function') { marquee.stop(); marquee.start(); }
            } else {
                container.classList.add('hidden');
                if (typeof marquee.stop === 'function') { marquee.stop(); }
            }
        });

        const colorPalette = [
            { bg: 'bg-blue-700', border: 'border-blue-300', text: 'text-blue-900' },
            { bg: 'bg-green-700', border: 'border-green-300', text: 'text-green-900' },
            { bg: 'bg-purple-700', border: 'border-purple-300', text: 'text-purple-900' },
            { bg: 'bg-pink-600', border: 'border-pink-300', text: 'text-pink-900' },
            { bg: 'bg-teal-700', border: 'border-teal-300', text: 'text-teal-900' }
        ];

        function getCounterColor(counterName) {
            let hash = 0;
            for (let i = 0; i < counterName.length; i++) hash += counterName.charCodeAt(i);
            return colorPalette[hash % colorPalette.length];
        }

        let callQueue = [];
        let isSpeaking = false;
        let recentCalls = []; 
        const loadTime = Date.now(); 

        function playSynthesizedChime() {
            return new Promise((resolve) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(987.77, ctx.currentTime); 
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.4); 
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.5, ctx.currentTime + 0.35);
                    gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.4);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.2);
                    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1.2);
                    setTimeout(resolve, 1300);
                } catch (e) { resolve(); }
            });
        }

        document.getElementById('testSoundBtn').onclick = () => {
            playSynthesizedChime().then(() => {
                if (typeof responsiveVoice !== 'undefined' && responsiveVoice.voiceSupport()) {
                    responsiveVoice.speak("ทดสอบระบบเสียงลำโพงสำเร็จค่ะ", "Thai Female", {rate: 0.75, pitch: 1, volume: 1});
                } else {
                    fallbackSpeak("ทดสอบระบบเสียงลำโพงสำเร็จค่ะ", setTimeout(()=>{},1000));
                }
            });
        };

        document.getElementById('startBtn').onclick = () => {
            document.getElementById('startOverlay').style.display = 'none';
            if (typeof responsiveVoice !== 'undefined') { responsiveVoice.speak(" ", "Thai Female", {volume: 0}); }
            const callsRef = query(ref(db, 'live/calls'), orderByChild('timestamp'), startAt(loadTime));
            onChildAdded(callsRef, (snapshot) => {
                callQueue.push(snapshot.val());
                processQueue();
            });
        };

        function updateRecentList(name, counterName, type, color) {
            const shortCounter = counterName.replace('ช่องบริการที่', 'ช่อง').replace('ช่องที่', 'ช่อง');
            const prefix = (type === 'recall') ? '🔄 ' : '';
            
            const itemHTML = `<div class="${color.bg} px-4 py-1 rounded-lg border ${color.border} shadow-sm whitespace-nowrap"><span class="text-white">${prefix}${name}</span> <span class="text-yellow-300 font-bold">(${shortCounter})</span></div>`;
            
            recentCalls.unshift(itemHTML);
            if (recentCalls.length > 4) recentCalls.pop(); 
            document.getElementById('recentList').innerHTML = recentCalls.join('');
        }

        function processQueue() {
            if (isSpeaking || callQueue.length === 0) return;
            isSpeaking = true;
            
            const data = callQueue.shift();
            const color = getCounterColor(data.counterName);
            
            document.getElementById('mainBox').className = `bg-white border-4 ${color.border} rounded-[3rem] p-12 md:p-16 shadow-2xl w-full max-w-5xl text-center relative transition-colors duration-500`;
            
            // 🟢 แก้ไขตรงนี้ด้วย: อัปเดตคลาสใน JavaScript ให้ตรงกับด้านบน
            document.getElementById('displayName').className = `text-6xl md:text-[5.5rem] font-bold ${color.text} mb-8 break-words whitespace-normal blink name-text transition-colors duration-500`;
            
            document.getElementById('counterBubble').className = `inline-block ${color.bg} px-16 py-6 rounded-full shadow-lg transition-colors duration-500 mt-4`;

            document.getElementById('displayName').innerText = data.name;
            document.getElementById('displayCounter').innerText = "ที่ " + data.counterName;
            
            updateRecentList(data.name, data.counterName, data.type, color);
            
            if (data.type === 'recall') {
                document.getElementById('recallBadge').classList.remove('hidden');
            } else {
                document.getElementById('recallBadge').classList.add('hidden');
            }
            
            playSynthesizedChime().then(() => {
                const textToSpeak = `ขอเชิญคุณ ${data.name} ที่ ${data.counterName} ค่ะ`;
                const safetyTimer = setTimeout(() => { isSpeaking = false; processQueue(); }, 6000);

                if (typeof responsiveVoice !== 'undefined' && responsiveVoice.voiceSupport()) {
                    try {
                        responsiveVoice.speak(textToSpeak, "Thai Female", {
                            rate: 0.75, pitch: 1, volume: 1,
                            onend: () => {
                                clearTimeout(safetyTimer);
                                setTimeout(() => { isSpeaking = false; processQueue(); }, 1500);
                            }
                        });
                    } catch (e) { fallbackSpeak(textToSpeak, safetyTimer); }
                } else {
                    fallbackSpeak(textToSpeak, safetyTimer);
                }
            });
        }

        function fallbackSpeak(text, safetyTimer) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH'; utterance.rate = 0.75;
            utterance.onend = () => { clearTimeout(safetyTimer); setTimeout(() => { isSpeaking = false; processQueue(); }, 1500); };
            utterance.onerror = () => { clearTimeout(safetyTimer); isSpeaking = false; processQueue(); };
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
