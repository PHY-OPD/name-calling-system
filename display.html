<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอแสดงคิว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- นำเข้าไลบรารี ResponsiveVoice (ฟรี) -->
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #000; overflow: hidden; }
        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; color: #fde047; } }
    </style>
</head>
<body class="text-white h-screen flex flex-col justify-center items-center relative">
    
    <!-- ปุ่มเพื่อปลดล็อกระบบเสียงของเบราว์เซอร์ -->
    <div id="startOverlay" class="absolute inset-0 bg-black z-50 flex items-center justify-center">
        <button id="startBtn" class="bg-blue-600 text-white text-4xl px-12 py-6 rounded-2xl shadow-[0_0_40px_rgba(37,99,235,0.6)] hover:bg-blue-700 hover:scale-105 transition">
            ▶ เริ่มหน้าจอประกาศ
        </button>
    </div>

    <!-- UI หน้าจอแสดงผล -->
    <div class="text-center w-full max-w-6xl px-4">
        <p class="text-4xl text-gray-400 mb-6 font-bold tracking-widest">ขอเชิญผู้รับบริการ</p>
        <div class="bg-gray-900 border-4 border-gray-700 rounded-3xl p-16 shadow-2xl">
            <h1 id="displayName" class="text-7xl md:text-[7rem] font-bold text-white mb-8 truncate blink">-- ว่าง --</h1>
            <div class="inline-block bg-blue-700 px-12 py-4 rounded-full">
                <h2 id="displayCounter" class="text-5xl md:text-6xl font-bold text-yellow-300">กรุณารอเรียกชื่อ</h2>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onChildAdded, query, orderByChild, startAt } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAUg9GVdMIYVX4M6w2K4gMVdYy3YlbowxU",
            authDomain: "ne-q-3e0b7.firebaseapp.com",
            databaseURL: "https://ne-q-3e0b7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ne-q-3e0b7",
            storageBucket: "ne-q-3e0b7.firebasestorage.app",
            messagingSenderId: "559471760244",
            appId: "1:559471760244:web:0d1721ae633f26b3a29221"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ระบบคิว
        let callQueue = [];
        let isSpeaking = false;
        const loadTime = Date.now(); 

        document.getElementById('startBtn').onclick = () => {
            // ซ่อนปุ่ม
            document.getElementById('startOverlay').style.display = 'none';

            // เล่นเสียงเงียบ 1 ครั้งเพื่อปลดล็อก Audio Context ให้ ResponsiveVoice พร้อมทำงาน
            if (typeof responsiveVoice !== 'undefined') {
                responsiveVoice.speak(" ", "Thai Female", {volume: 0});
            }

            // เริ่มดึงข้อมูลจาก Firebase
            const callsRef = query(ref(db, 'live/calls'), orderByChild('timestamp'), startAt(loadTime));
            onChildAdded(callsRef, (snapshot) => {
                callQueue.push(snapshot.val());
                processQueue();
            });
        };

        function processQueue() {
            if (isSpeaking || callQueue.length === 0) return;
            isSpeaking = true;
            
            // ดึงคิวแรกออกมา
            const data = callQueue.shift();
            
            // อัปเดตหน้าจอ
            document.getElementById('displayName').innerText = data.name;
            document.getElementById('displayCounter').innerText = "ที่ " + data.counterName;
            
            const textToSpeak = `ขอเชิญคุณ ${data.name} ที่ ${data.counterName} ค่ะ`;
            
            // สั่งอ่านเสียงด้วย ResponsiveVoice
            if (typeof responsiveVoice !== 'undefined') {
                responsiveVoice.speak(textToSpeak, "Thai Female", {
                    rate: 0.75,   // ความเร็วเสียง (0.7 - 0.8 กำลังดีสำหรับภาษาไทย)
                    pitch: 1,     // ระดับความสูงต่ำของเสียง
                    volume: 1,    // ความดัง
                    onend: () => {
                        // เมื่อพูดจบ รอ 1.5 วินาทีค่อยเรียกคิวถัดไป (ป้องกันเสียงตีกัน)
                        setTimeout(() => {
                            isSpeaking = false;
                            processQueue();
                        }, 1500); 
                    }
                });
            } else {
                console.error("โหลดไลบรารีเสียงไม่สำเร็จ");
                isSpeaking = false;
                processQueue();
            }
        }
    </script>
</body>
</html>
