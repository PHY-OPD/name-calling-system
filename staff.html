<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - เรียกชื่อผู้รับบริการ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center">

    <div id="loginSection" class="w-full max-w-sm bg-white p-8 rounded-xl shadow-md mt-10">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">เข้าสู่ระบบพนักงาน</h1>
        <input type="email" id="email" placeholder="อีเมล" class="border p-3 rounded w-full mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
        <input type="password" id="pass" placeholder="รหัสผ่าน" class="border p-3 rounded w-full mb-6 focus:ring-2 focus:ring-blue-500 outline-none">
        <button id="loginBtn" class="bg-blue-600 text-white px-4 py-3 rounded w-full font-semibold hover:bg-blue-700 transition">เข้าสู่ระบบ</button>
    </div>

    <div id="staffApp" class="w-full max-w-2xl bg-white p-8 rounded-xl shadow-md hidden mt-4 mb-10">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800" id="counterDisplay">กำลังโหลด...</h1>
                <p class="text-sm text-gray-500">ระบบเรียกชื่อผู้รับบริการ</p>
            </div>
            <button id="logoutBtn" class="text-red-500 hover:text-red-700 text-sm font-semibold">ออกจากระบบ</button>
        </div>

        <div class="mb-6 bg-blue-50 p-6 rounded-xl border border-blue-100">
            <label class="block text-blue-900 text-lg font-bold mb-2">พิมพ์ชื่อ - นามสกุล ผู้รับบริการ</label>
            <input type="text" id="patientName" placeholder="เช่น นาย สมชาย ใจดี" class="border-2 border-gray-300 p-4 rounded-lg w-full text-xl focus:border-blue-500 outline-none" autocomplete="off">
            <p class="text-xs text-gray-500 mt-2">*ห้ามใส่อักขระพิเศษ</p>

            <div class="grid grid-cols-2 gap-4 mt-4">
                <button id="callBtn" class="bg-green-500 text-white p-4 rounded-lg font-bold text-lg hover:bg-green-600 shadow active:scale-95 transition">
                    📢 เรียกลำดับใหม่
                </button>
                <button id="skipBtn" class="bg-gray-200 text-gray-700 p-4 rounded-lg font-bold text-lg hover:bg-gray-300 shadow active:scale-95 transition">
                    ⏭️ ข้าม / พักคิว
                </button>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="font-bold text-lg text-gray-700 mb-4 flex items-center gap-2">
                📋 รายชื่อที่ถูกข้าม (รอเรียกซ้ำ)
            </h3>
            <ul id="skippedList" class="space-y-3"></ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            /* วาง FIREBASE CONFIG ของคุณที่นี่ */
            apiKey: "AIzaSyAUg9GVdMIYVX4M6w2K4gMVdYy3YlbowxU",
            authDomain: "ne-q-3e0b7.firebaseapp.com",
            databaseURL: "https://ne-q-3e0b7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ne-q-3e0b7",
            storageBucket: "ne-q-3e0b7.firebasestorage.app",
            messagingSenderId: "559471760244",
            appId: "1:559471760244:web:0d1721ae633f26b3a29221"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let myCounterName = "";
        let myCounterId = "";

        const loginSection = document.getElementById('loginSection');
        const staffApp = document.getElementById('staffApp');
        const patientNameInput = document.getElementById('patientName');
        const skippedList = document.getElementById('skippedList');

        // กรองอักขระพิเศษ
        patientNameInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^ก-๙a-zA-Z\s]/g, '');
        });

        // จัดการ Login State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnapshot = await get(ref(db, `users/${user.uid}`));
                if (userSnapshot.exists() && userSnapshot.val().role === 'staff') {
                    myCounterId = userSnapshot.val().counterId;
                    const counterSnapshot = await get(ref(db, `counters/${myCounterId}`));
                    if (counterSnapshot.exists()) {
                        myCounterName = counterSnapshot.val().name;
                        document.getElementById('counterDisplay').innerText = myCounterName;
                        loginSection.classList.add('hidden');
                        staffApp.classList.remove('hidden');
                    }
                } else {
                    alert("สิทธิ์ไม่ถูกต้อง");
                    signOut(auth);
                }
            } else {
                loginSection.classList.remove('hidden');
                staffApp.classList.add('hidden');
            }
        });

        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value)
                .catch(e => alert("เข้าสู่ระบบล้มเหลว"));
        };

        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth);
            patientNameInput.value = '';
            skippedList.innerHTML = ''; // ล้างคิวที่ข้ามไว้เมื่อออกระบบ
        };

        // ฟังก์ชันส่งคิวขึ้นจอ
        const pushToDisplay = (name, type) => {
            push(ref(db, 'live/calls'), {
                name: name,
                counterName: myCounterName,
                timestamp: Date.now(),
                type: type
            });
        };

        // กดเรียกลำดับใหม่
        document.getElementById('callBtn').onclick = () => {
            const name = patientNameInput.value.trim();
            if (!name) { alert("กรุณาพิมพ์ชื่อ"); return; }
            pushToDisplay(name, 'new');
            // เรียลใหม่แล้วให้ค้างชื่อไว้ก่อน เผื่อต้องกดข้าม
        };

        // กดปุ่ม ข้าม / พักคิว
        document.getElementById('skipBtn').onclick = () => {
            const name = patientNameInput.value.trim();
            if (!name) return; // ถ้าช่องว่างก็ไม่ต้องทำอะไร

            // สร้างรายการใหม่ลงใน List ด้านล่าง
            const li = document.createElement('li');
            li.className = "flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50 p-4 border rounded-lg shadow-sm gap-3";

            // ชื่อคนไข้
            const nameSpan = document.createElement('span');
            nameSpan.className = "font-semibold text-lg text-gray-800";
            nameSpan.innerText = name;

            // กลุ่มปุ่มจัดการ (เรียกซ้ำ / เสร็จสิ้น)
            const actionDiv = document.createElement('div');
            actionDiv.className = "flex gap-2 w-full sm:w-auto";

            const recallBtn = document.createElement('button');
            recallBtn.className = "flex-1 sm:flex-none bg-orange-500 text-white px-4 py-2 rounded-md font-bold hover:bg-orange-600 active:scale-95 transition";
            recallBtn.innerText = "🔄 เรียกซ้ำ";
            recallBtn.onclick = () => pushToDisplay(name, 'recall');

            const doneBtn = document.createElement('button');
            doneBtn.className = "flex-1 sm:flex-none bg-green-600 text-white px-4 py-2 rounded-md font-bold hover:bg-green-700 active:scale-95 transition";
            doneBtn.innerText = "✅ เสร็จสิ้น";
            doneBtn.onclick = () => {
                li.remove(); // ลบออกจากรายการเมื่อกดเสร็จสิ้น
            };

            actionDiv.appendChild(recallBtn);
            actionDiv.appendChild(doneBtn);
            
            li.appendChild(nameSpan);
            li.appendChild(actionDiv);

            skippedList.appendChild(li);

            // เคลียร์ช่องพิมพ์ เพื่อรับคนต่อไปทันที
            patientNameInput.value = '';
        };
    </script>
</body>
</html>
