<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - เรียกชื่อผู้รับบริการ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="loginSection" class="w-full max-w-sm bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">เข้าสู่ระบบพนักงาน</h1>
        <input type="email" id="email" placeholder="อีเมล" class="border p-3 rounded w-full mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
        <input type="password" id="pass" placeholder="รหัสผ่าน" class="border p-3 rounded w-full mb-6 focus:ring-2 focus:ring-blue-500 outline-none">
        <button id="loginBtn" class="bg-blue-600 text-white px-4 py-3 rounded w-full font-semibold hover:bg-blue-700 transition">เข้าสู่ระบบ</button>
    </div>

    <div id="staffApp" class="w-full max-w-lg bg-white p-8 rounded-xl shadow-md hidden">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800" id="counterDisplay">กำลังโหลด...</h1>
                <p class="text-sm text-gray-500">ระบบเรียกชื่อผู้รับบริการ</p>
            </div>
            <button id="logoutBtn" class="text-red-500 hover:text-red-700 text-sm font-semibold">ออกจากระบบ</button>
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">พิมพ์ชื่อ - นามสกุล ผู้รับบริการ</label>
            <input type="text" id="patientName" placeholder="เช่น นาย สมชาย ใจดี" class="border-2 border-gray-300 p-4 rounded-lg w-full text-lg focus:border-blue-500 outline-none" autocomplete="off">
            <p class="text-xs text-gray-400 mt-1">*ห้ามใส่อักขระพิเศษ</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button id="callBtn" class="bg-green-500 text-white p-4 rounded-lg font-bold text-lg hover:bg-green-600 shadow-lg active:scale-95 transition flex justify-center items-center gap-2">
                📢 เรียกลำดับใหม่
            </button>
            <button id="recallBtn" class="bg-orange-500 text-white p-4 rounded-lg font-bold text-lg hover:bg-orange-600 shadow-lg active:scale-95 transition disabled:opacity-50">
                🔄 เรียกซ้ำ
            </button>
        </div>
        
        <button id="clearBtn" class="w-full mt-4 bg-gray-200 text-gray-700 p-3 rounded-lg font-bold hover:bg-gray-300 transition">
            เสร็จสิ้น / เคลียร์หน้าจอ
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAUg9GVdMIYVX4M6w2K4gMVdYy3YlbowxU",
            authDomain: "ne-q-3e0b7.firebaseapp.com",
            databaseURL: "https://ne-q-3e0b7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ne-q-3e0b7",
            storageBucket: "ne-q-3e0b7.firebasestorage.app",
            messagingSenderId: "559471760244",
            appId: "1:559471760244:web:0d1721ae633f26b3a29221",
            measurementId: "G-8NCWYGGXLZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let myCounterName = "";
        let myCounterId = "";

        // UI Logic
        const loginSection = document.getElementById('loginSection');
        const staffApp = document.getElementById('staffApp');
        const patientNameInput = document.getElementById('patientName');

        // Validation - กันอักขระแปลกปลอม
        patientNameInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^ก-๙a-zA-Z\s]/g, '');
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Fetch staff info
                const userSnapshot = await get(ref(db, `users/${user.uid}`));
                if (userSnapshot.exists() && userSnapshot.val().role === 'staff') {
                    myCounterId = userSnapshot.val().counterId;
                    const counterSnapshot = await get(ref(db, `counters/${myCounterId}`));
                    if (counterSnapshot.exists()) {
                        myCounterName = counterSnapshot.val().name;
                        document.getElementById('counterDisplay').innerText = myCounterName;
                        loginSection.classList.add('hidden');
                        staffApp.classList.remove('hidden');
                    } else {
                        alert("ไม่พบข้อมูลช่องบริการของคุณ กรุณาติดต่อ Admin");
                        signOut(auth);
                    }
                } else {
                    alert("คุณไม่มีสิทธิ์เข้าถึงหน้านี้");
                    signOut(auth);
                }
            } else {
                loginSection.classList.remove('hidden');
                staffApp.classList.add('hidden');
            }
        });

        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value)
                .catch(e => alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง"));
        };

        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth);
            patientNameInput.value = '';
        };

        const pushCall = (type) => {
            const name = patientNameInput.value.trim();
            if (!name) { alert("กรุณาพิมพ์ชื่อ"); return; }
            
            // ส่งข้อมูลขึ้น Firebase -> Display จะดึงไปแสดงและอ่านเสียง
            push(ref(db, 'live/calls'), {
                name: name,
                counterName: myCounterName,
                timestamp: Date.now(),
                type: type
            });
        };

        document.getElementById('callBtn').onclick = () => pushCall('new');
        document.getElementById('recallBtn').onclick = () => pushCall('recall');
        document.getElementById('clearBtn').onclick = () => patientNameInput.value = '';
    </script>
</body>
</html>
